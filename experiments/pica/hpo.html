<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PICA Pitch HPO</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        background: #050505;
        color: #e2e8f0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
      }

      #app {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        min-height: 100dvh;
      }

      #toolbar,
      #summary {
        padding: 10px 14px;
        border-bottom: 1px solid #1f2937;
        background: #0b0b0b;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        font-size: 12px;
      }

      #content {
        padding: 14px;
        display: grid;
        gap: 18px;
      }

      .heatmap-chart {
        width: 100%;
        height: 640px;
        border: 1px solid #1f2937;
        border-radius: 10px;
        overflow: hidden;
      }

      .toolbar-btn {
        border: 1px solid #334155;
        background: #111827;
        color: #e2e8f0;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .toolbar-btn:disabled {
        opacity: 0.45;
        cursor: default;
      }

      #status,
      #sweepInfo {
        white-space: nowrap;
      }

      #status {
        color: #a7f3d0;
        min-width: 0;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #sweepInfo {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <button id="runButton" class="toolbar-btn" type="button">Run 10x10 Sweep</button>
        <div id="sweepInfo">Loading sweep settings...</div>
        <div id="status">Ready.</div>
      </div>
      <div id="summary"></div>
      <div id="content">
        <div id="heatmaps"></div>
      </div>
    </div>
    <script type="module" src="hpo.js"></script>
  </body>
</html>
