<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pica Sample Pitch Experiment</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100dvh;
      }

      body {
        margin: 0;
        height: 100%;
        background: #050505;
        color: #e2e8f0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
      }

      #app {
        height: 100%;
        display: grid;
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      }

      #topRow {
        min-height: 0;
        display: grid;
        grid-template-columns: max-content minmax(0, 1fr);
      }

      #bottomRow {
        min-height: 0;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .quadrant {
        min-width: 0;
        min-height: 0;
        padding: 8px;
        overflow: hidden;
      }

      #controlsPanel {
        display: flex;
        flex-direction: column;
        gap: 8px;
        font-size: 12px;
        overflow: auto;
      }

      #processingControls {
        display: flex;
        align-items: center;
      }

      #paramsColumn {
        min-width: 0;
      }

      .params-table {
        border-collapse: collapse;
        font-size: 12px;
      }

      .params-table th,
      .params-table td {
        padding: 4px 8px 4px 0;
        text-align: left;
        vertical-align: middle;
        white-space: nowrap;
      }

      .params-table th {
        color: #93c5fd;
        font-weight: 600;
      }

      .params-table td {
        color: #e2e8f0;
      }

      .params-used-with {
        color: #94a3b8;
      }

      #metaActions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      #status {
        color: #a7f3d0;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      #perfInfo {
        color: #93c5fd;
      }

      #perfInfo {
        min-width: 0;
        overflow: auto;
      }

      #paramsSection {
        margin-top: 20px;
      }

      .perf-table {
        border-collapse: collapse;
        font-size: 11px;
      }

      .perf-table th,
      .perf-table td {
        border: 1px solid #1e293b;
        padding: 3px 6px;
        text-align: right;
        white-space: nowrap;
      }

      .perf-table th:first-child {
        text-align: left;
        color: #cbd5e1;
      }

      .perf-table thead th {
        color: #93c5fd;
        font-weight: 600;
      }

      .perf-table td {
        color: #e2e8f0;
      }

      .perf-table .perf-accuracy {
        font-weight: 700;
      }

      .toolbar-btn {
        border: 1px solid #334155;
        background: #111827;
        color: #e2e8f0;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .toolbar-btn:disabled {
        opacity: 0.45;
        cursor: default;
      }

      .toolbar-select {
        border: 1px solid #334155;
        background: #111827;
        color: #e2e8f0;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 12px;
        min-width: 0;
        flex: 1 1 220px;
        max-width: 400px;
      }

      .toolbar-field {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #94a3b8;
      }

      .toolbar-checkbox {
        color: #cbd5e1;
      }

      #methodToggleControls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .toolbar-checkbox input {
        margin: 0;
      }

      .toolbar-number {
        border: 1px solid #334155;
        background: #111827;
        color: #e2e8f0;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
        width: 74px;
      }

      #pitchChart,
      #waveformChart,
      #harmonicChart,
      #correlationHeatmapChart {
        width: 100%;
        height: 100%;
        min-height: 0;
        transition: opacity 120ms linear;
      }

      #foldPanel {
        display: none;
      }

      body.loading #pitchChart,
      body.loading #waveformChart,
      body.loading #harmonicChart,
      body.loading #correlationHeatmapChart {
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="topRow">
        <div id="controlsPanel" class="quadrant">
          <div id="metaActions">
            <button id="recordButton" class="toolbar-btn" type="button">Record 5s</button>
            <select id="sourceSelect" class="toolbar-select" aria-label="Audio source"></select>
          </div>
          <div id="methodToggleControls"></div>
          <div id="processingControls">
            <label class="toolbar-field toolbar-checkbox">
              <input id="postProcessingEnabled" type="checkbox" checked />
              Post Processing
            </label>
          </div>
          <div id="perfInfo"></div>
          <div id="status">Ready to record.</div>
          <div id="paramsSection">
            <div id="paramsColumn"></div>
          </div>
          <div>
            <button id="resetStorageButton" class="toolbar-btn" type="button">
              Reset stored params
            </button>
          </div>
        </div>
        <div class="quadrant">
          <div id="pitchChart"></div>
        </div>
      </div>
      <div id="bottomRow">
        <div class="quadrant">
          <div id="waveformChart"></div>
        </div>
        <div class="quadrant">
          <div id="harmonicChart"></div>
        </div>
        <div class="quadrant">
          <div id="correlationHeatmapChart"></div>
        </div>
      </div>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
