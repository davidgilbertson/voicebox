<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pica Sample Pitch Experiment</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100dvh;
    }

    body {
      margin: 0;
      height: 100%;
      background: #050505;
      color: #e2e8f0;
      font-family: ui-sans-serif,
      system-ui,
      -apple-system,
      Segoe UI,
      sans-serif;
    }

    #app {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }

    .quadrant {
      min-width: 0;
      min-height: 0;
      padding: 8px;
      overflow: hidden;
    }

    #controlsPanel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 12px;
      overflow: auto;
    }

    #paramsColumn {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #metaActions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    #status {
      color: #a7f3d0;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    #perfInfo,
    #windowInfo,
    #actualPitchInfo {
      color: #93c5fd;
    }

    #perfInfo {
      min-width: 0;
      overflow: auto;
    }

    #windowInfo,
    #actualPitchInfo {
      overflow-wrap: anywhere;
    }

    #paramsSection {
      margin-top: 20px;
    }

    .perf-table {
      border-collapse: collapse;
      font-size: 11px;
    }

    .perf-table th,
    .perf-table td {
      border: 1px solid #1e293b;
      padding: 3px 6px;
      text-align: right;
      white-space: nowrap;
    }

    .perf-table th:first-child {
      text-align: left;
      color: #cbd5e1;
    }

    .perf-table thead th {
      color: #93c5fd;
      font-weight: 600;
    }

    .perf-table td {
      color: #e2e8f0;
    }

    .perf-table .perf-accuracy {
      font-weight: 700;
    }

    .toolbar-btn {
      border: 1px solid #334155;
      background: #111827;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .toolbar-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .toolbar-select {
      border: 1px solid #334155;
      background: #111827;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      min-width: 0;
      flex: 1 1 220px;
      max-width: 400px;
    }

    .toolbar-field {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #94a3b8;
    }

    #paramsColumn .toolbar-field {
      display: grid;
      grid-template-columns: 180px auto;
      justify-content: start;
      width: fit-content;
    }

    .toolbar-checkbox {
      color: #cbd5e1;
    }

    #methodToggleControls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .toolbar-checkbox input {
      margin: 0;
    }

    .toolbar-number {
      border: 1px solid #334155;
      background: #111827;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      width: 74px;
    }

    #pitchChart,
    #waveformChart,
    #harmonicChart {
      width: 100%;
      height: 100%;
      min-height: 0;
      transition: opacity 120ms linear;
    }

    body.loading #pitchChart,
    body.loading #waveformChart,
    body.loading #harmonicChart {
      opacity: 0.55;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="controlsPanel" class="quadrant">
    <div id="metaActions">
      <button id="recordButton" class="toolbar-btn" type="button">Record 5s</button>
      <select id="sourceSelect" class="toolbar-select" aria-label="Audio source"></select>
    </div>
    <div id="methodToggleControls"></div>
    <div id="perfInfo"></div>
    <div id="status">Ready to record.</div>
    <div id="windowInfo">
      Sample window uses 2 cycles at E1, which is 2330 samples at 48 kHz (~48.5 ms).
    </div>
    <div id="actualPitchInfo">
      Actual labels 0. Shortcuts: A/D move always. Q/E copy, W null + next, S forget + next in
      labeling mode.
    </div>
    <div id="paramsSection">
      <div id="paramsColumn">
        <label class="toolbar-field"
        >minAmp
          <input
                  id="minAmp"
                  class="toolbar-number"
                  type="number"
                  min="0"
                  max="1"
                  step="0.01"
                  value="0.01"
                  title="Minimum window or compared-region peak amplitude required before Pica accepts it."
          /></label>
        <label class="toolbar-field"
        >minCorr
          <input
                  id="minCorr"
                  class="toolbar-number"
                  type="number"
                  min="0"
                  max="1"
                  step="0.01"
                  value="0.95"
                  title="Minimum winning-candidate correlation required before Pica accepts it."
          /></label>
        <label class="toolbar-field"
        >minCarryCorr
          <input
                  id="minCarryCorr"
                  class="toolbar-number"
                  type="number"
                  min="0"
                  max="20"
                  step="0.01"
                  value="3"
                  title="Minimum prior and walked correlation required before the carry-forward path can win."
          /></label>
        <label class="toolbar-field"
        >maxCrossingsPerPeriod
          <input
                  id="maxCrossingsPerPeriod"
                  class="toolbar-number"
                  type="number"
                  min="2"
                  max="64"
                  step="2"
                  value="20"
                  title="Maximum zero crossings to allow in one period when collecting recent folds."
          /></label>
        <label class="toolbar-field"
        >maxPatches
          <input
                  id="maxComparisonPatches"
                  class="toolbar-number"
                  type="number"
                  min="2"
                  max="16"
                  step="1"
                  value="7"
                  title="Maximum number of trailing period-sized patches to compare when scoring a candidate period."
          /></label>
        <label class="toolbar-field"
        >corrPts
          <input
                  id="corrSamplePoints"
                  class="toolbar-number"
                  type="number"
                  min="1"
                  max="128"
                  step="1"
                  value="30"
                  title="Approximate number of sampled points per compared patch when computing correlation."
          /></label>
        <label class="toolbar-field"
        >maxWalk
          <input
                  id="maxWalkSteps"
                  class="toolbar-number"
                  type="number"
                  min="0"
                  max="64"
                  step="2"
                  value="10"
                  title="Maximum number of one-sample period adjustments to try when hill-climbing a candidate period."
          /></label>
        <label class="toolbar-field"
        >maxCarryRun
          <input
                  id="maxCarryRun"
                  class="toolbar-number"
                  type="number"
                  min="1"
                  max="200"
                  step="1"
                  value="50"
                  title="Maximum number of consecutive carry-forward windows before Pica forces a fresh extrema search."
          /></label>
        <label class="toolbar-field"
        >corrHzRatio
          <input
                  id="correlationToHzWeightRatio"
                  class="toolbar-number"
                  type="number"
                  min="0"
                  max="100"
                  step="0.5"
                  value="0.5"
                  title="Correlation feature weight relative to the Hz feature weight of 1."
          /></label>
      </div>
    </div>
    <div>
      <button id="resetStorageButton" class="toolbar-btn" type="button">
        Reset stored params
      </button>
    </div>
  </div>
  <div class="quadrant">
    <div id="pitchChart"></div>
  </div>
  <div class="quadrant">
    <div id="waveformChart"></div>
  </div>
  <div class="quadrant">
    <div id="harmonicChart"></div>
  </div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
