<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Vibrato Detection Experiment</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100dvh;
    }

    body {
      margin: 0;
      height: 100%;
      background: #050505;
      color: #e2e8f0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
    }

    #app {
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) minmax(0, 1fr);
    }

    #toolbar {
      padding: 10px 14px;
      border-bottom: 1px solid #1f2937;
      background: #0b0b0b;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    #status {
      color: #a7f3d0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1;
    }

    .toolbar-btn {
      border: 1px solid #334155;
      background: #111827;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .toolbar-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .toolbar-select {
      border: 1px solid #334155;
      background: #111827;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      min-width: 220px;
    }

    #pitchChart,
    #vibratoLastTwoShapePeaksChart {
      width: 100%;
      height: 100%;
      min-height: 0;
      transition: opacity 120ms linear;
    }

    body.loading #pitchChart,
    body.loading #vibratoLastTwoShapePeaksChart {
      opacity: 0.55;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <button id="recordButton" class="toolbar-btn" type="button">Record 5s</button>
    <select id="sourceSelect" class="toolbar-select" aria-label="Audio source"></select>
    <div id="status">Ready to record.</div>
  </div>
  <div id="pitchChart"></div>
  <div id="vibratoLastTwoShapePeaksChart"></div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
