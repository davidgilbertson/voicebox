<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Raw Sample Pitch Experiment</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100dvh;
      }

      body {
        margin: 0;
        height: 100%;
        background: #050505;
        color: #e2e8f0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
      }

      #app {
        height: 100%;
        display: grid;
        grid-template-rows: auto auto auto minmax(0, 1fr) minmax(0, 1fr) minmax(0, 1fr);
      }

      #toolbar,
      #subtoolbar,
      #candidatePanel {
        padding: 10px 14px;
        border-bottom: 1px solid #1f2937;
        background: #0b0b0b;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        font-size: 12px;
      }

      #status {
        color: #a7f3d0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
        flex: 1;
      }

      #perfInfo,
      #windowInfo {
        color: #93c5fd;
        white-space: nowrap;
      }

      #candidatePanel {
        display: block;
        overflow-x: auto;
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .candidate-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 6px;
        font-size: 12px;
      }

      .candidate-table th {
        color: #94a3b8;
        font-weight: 600;
        text-align: left;
      }

      .candidate-table td,
      .candidate-table th {
        white-space: nowrap;
      }

      .candidate-meta {
        color: #cbd5e1;
      }

      .candidate-value {
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 6px 8px;
        min-width: 86px;
        text-align: right;
        color: #f8fafc;
      }

      .candidate-selected {
        border-width: 3px;
        border-color: #f8fafc;
      }

      .candidate-empty {
        color: #64748b;
        background: rgba(15, 23, 42, 0.4);
      }

      .toolbar-btn {
        border: 1px solid #334155;
        background: #111827;
        color: #e2e8f0;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .toolbar-btn:disabled {
        opacity: 0.45;
        cursor: default;
      }

      .toolbar-select {
        border: 1px solid #334155;
        background: #111827;
        color: #e2e8f0;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 12px;
        min-width: 220px;
      }

      .toolbar-field {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #94a3b8;
        white-space: nowrap;
      }

      .toolbar-number {
        border: 1px solid #334155;
        background: #111827;
        color: #e2e8f0;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
        width: 74px;
      }

      #pitchChart,
      #waveformChart,
      #harmonicChart {
        width: 100%;
        height: 100%;
        min-height: 0;
        transition: opacity 120ms linear;
      }

      body.loading #pitchChart,
      body.loading #waveformChart,
      body.loading #harmonicChart {
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <button id="recordButton" class="toolbar-btn" type="button">Record 5s</button>
        <select id="sourceSelect" class="toolbar-select" aria-label="Audio source"></select>
        <label class="toolbar-field"
          >topPeaks
          <input
            id="topPeakCount"
            class="toolbar-number"
            type="number"
            min="2"
            max="32"
            step="1"
            value="8"
            title="How many of the highest peaks to keep before building raw-period candidates."
        /></label>
        <label class="toolbar-field"
          >logCutoff
          <input
            id="logCorrelationCutoff"
            class="toolbar-number"
            type="number"
            min="0"
            max="2"
            step="0.01"
            value="2"
            title="Log-correlation cutoff used for both half and double candidate rules."
        /></label>
        <label class="toolbar-field"
          >maxPatches
          <input
            id="maxComparisonPatches"
            class="toolbar-number"
            type="number"
            min="2"
            max="16"
            step="1"
            value="3"
            title="Maximum number of trailing period-sized patches to compare when scoring a candidate period."
        /></label>
        <label class="toolbar-field"
          >maxWalk
          <input
            id="maxWalkSteps"
            class="toolbar-number"
            type="number"
            min="0"
            max="64"
            step="1"
            value="10"
            title="Maximum number of one-sample period adjustments to try when hill-climbing a candidate period."
        /></label>
        <div id="perfInfo">Speed: n/a</div>
        <div id="status">Ready to record.</div>
      </div>
      <div id="subtoolbar">
        <div id="windowInfo">
          Raw-sample window uses 2 cycles at E1, which is 2330 samples at 48 kHz (~48.5 ms).
        </div>
      </div>
      <div id="candidatePanel"></div>
      <div id="pitchChart"></div>
      <div id="waveformChart"></div>
      <div id="harmonicChart"></div>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
