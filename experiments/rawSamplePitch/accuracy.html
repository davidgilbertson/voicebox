<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Raw Sample Pitch Accuracy</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        background: #050505;
        color: #e2e8f0;
        font-size: 16px;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
      }

      #app {
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        min-height: 100dvh;
      }

      #toolbar,
      #summary {
        padding: 10px 14px;
        border-bottom: 1px solid #1f2937;
        background: #0b0b0b;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        font-size: 15px;
      }

      #content {
        padding: 14px;
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .toolbar-btn {
        border: 1px solid #334155;
        background: #111827;
        color: #e2e8f0;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 15px;
        cursor: pointer;
      }

      .toolbar-btn:disabled {
        opacity: 0.45;
        cursor: default;
      }

      #status,
      #settingsInfo {
        white-space: nowrap;
      }

      #status {
        color: #a7f3d0;
        min-width: 0;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #settingsInfo {
        color: #93c5fd;
      }

      #summary {
        color: #cbd5e1;
        font-size: 18px;
      }

      #results {
        margin: 0;
        padding-left: 24px;
        color: #cbd5e1;
        font-size: 17px;
      }

      #results li + li {
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <button id="runButton" class="toolbar-btn" type="button">Run Accuracy</button>
        <div id="settingsInfo">Loading settings...</div>
        <div id="status">Ready.</div>
      </div>
      <div id="summary"></div>
      <div id="content">
        <ol id="results"></ol>
      </div>
    </div>
    <script type="module">
      import { getAssetSources } from "../audioSource.js";
      import { analyzePreparedPitchSample, loadPitchSample } from "./analysis.js";
      import { RAW_SETTINGS_DEFAULTS } from "./config.js";

      function setStatus(text, isError = false) {
        const status = document.getElementById("status");
        status.textContent = text;
        status.style.color = isError ? "#fca5a5" : "#a7f3d0";
      }

      function setSummary(text) {
        document.getElementById("summary").textContent = text;
      }

      function setSettingsInfo() {
        const settings = RAW_SETTINGS_DEFAULTS;
        document.getElementById("settingsInfo").textContent =
          `Defaults: maxExtremaPerFold=${settings.maxExtremaPerFold}, maxCrossingsPerPeriod=${settings.maxCrossingsPerPeriod}, maxComparisonPatches=${settings.maxComparisonPatches}, maxWalkSteps=${settings.maxWalkSteps}, minLogCorr=${settings.rawGlobalLogCorrelationCutoff}, octaveBias=${settings.octaveBias}, peakinessBias=${settings.peakinessBias}`;
      }

      function getSelectedSources() {
        const sources = getAssetSources();
        return [...sources.slice(0, 3), ...sources.slice(-4)];
      }

      function setResults(items) {
        const results = document.getElementById("results");
        results.innerHTML = items.map((item) => `<li>${item}</li>`).join("");
      }

      async function runAccuracy() {
        const runButton = document.getElementById("runButton");
        runButton.disabled = true;
        setSummary("");
        setResults([]);

        try {
          const sources = getSelectedSources();
          let totalCorrectCount = 0;
          let totalComparedCount = 0;
          let totalElapsedMs = 0;
          let totalAudioSec = 0;
          const items = [];

          for (let index = 0; index < sources.length; index += 1) {
            const source = sources[index];
            const loadMessage = `Loading ${source.label} (${index + 1}/${sources.length})...`;
            console.log(loadMessage);
            setStatus(loadMessage);

            const preparedSample = await loadPitchSample(source.url);
            const startMs = performance.now();
            const result = await analyzePreparedPitchSample(preparedSample, RAW_SETTINGS_DEFAULTS);
            const elapsedMs = performance.now() - startMs;

            totalCorrectCount += result.metrics.rawCorrectCount;
            totalComparedCount += result.metrics.rawComparedCount;
            totalElapsedMs += elapsedMs;
            totalAudioSec += result.samples.length / result.sampleRate;

            const accuracy = result.metrics.rawAccuracy;
            const summary = `${source.label}: ${(accuracy * 100).toFixed(1)}% (${result.metrics.rawCorrectCount}/${result.metrics.rawComparedCount}), ${elapsedMs.toFixed(1)}ms, raw realtime ${(1000 / result.perf.rawPipelineMsPerSecondAudio).toFixed(1)}x`;
            console.log(summary);
            items.push(summary);
            setResults(items);
          }

          const aggregateAccuracy =
            totalComparedCount > 0 ? totalCorrectCount / totalComparedCount : Number.NaN;
          const aggregateRawRealtime =
            totalAudioSec > 0 ? 1000 / (totalElapsedMs / totalAudioSec) : Number.NaN;
          const aggregateSummary = Number.isFinite(aggregateAccuracy)
            ? `Aggregate accuracy ${(aggregateAccuracy * 100).toFixed(1)}% (${totalCorrectCount}/${totalComparedCount}) across ${sources.length} files. Raw realtime overall ${aggregateRawRealtime.toFixed(1)}x.`
            : "No valid results.";

          console.log(aggregateSummary);
          setSummary(aggregateSummary);
          setStatus(`Done. ${sources.length} files scored.`);
        } catch (error) {
          console.error(error);
          setSummary("");
          setResults([]);
          setStatus(error instanceof Error ? error.message : String(error), true);
        } finally {
          runButton.disabled = false;
        }
      }

      document.getElementById("runButton").addEventListener("click", () => {
        void runAccuracy();
      });

      setSettingsInfo();
      void runAccuracy();
    </script>
  </body>
</html>
