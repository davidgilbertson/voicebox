<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2D Pitch Experiment</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100dvh;
      }

      body {
        margin: 0;
        height: 100%;
        background: #050505;
        color: #e2e8f0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
      }

      #app {
        height: 100%;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) minmax(0, 1fr) auto;
      }

      #toolbar {
        padding: 10px 14px;
        border-bottom: 1px solid #1f2937;
        background: #0b0b0b;
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 12px;
      }

      #title {
        color: #f8fafc;
        font-weight: 700;
      }

      #status {
        min-width: 0;
        color: #a7f3d0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #gridWrap {
        min-height: 0;
        padding: 12px 16px;
        display: grid;
        place-items: center;
      }

      #noteGrid {
        width: min(100%, 1120px);
        display: grid;
        grid-template-columns: 46px repeat(12, minmax(44px, 1fr));
      }

      #chartWrap {
        min-height: 0;
        padding: 12px 16px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 16px;
        width: 100%;
      }

      #waveformChart,
      #spectrogramChart {
        width: 100%;
        height: 100%;
        min-height: 0;
      }

      .axis-label {
        min-height: 40px;
        display: grid;
        place-items: center;
        color: #94a3b8;
        font-size: 12px;
        font-weight: 600;
      }

      .note-slot {
        aspect-ratio: 1;
        min-height: 44px;
        display: grid;
        place-items: center;
        position: relative;
      }

      .note-slot::before,
      .note-slot::after {
        content: "";
        position: absolute;
        background: #334155;
      }

      .note-slot::before {
        width: 100%;
        height: 1px;
        top: 50%;
        left: 0;
      }

      .note-slot.first-column::before {
        width: 50%;
        left: 50%;
      }

      .note-slot.last-column::before {
        width: 50%;
      }

      .note-slot::after {
        width: 1px;
        height: 100%;
        top: 0;
        left: 50%;
      }

      .note-slot.first-row::after {
        height: 50%;
        top: 50%;
      }

      .note-slot.last-row::after {
        height: 50%;
      }

      .note-cell {
        width: 30px;
        height: 30px;
        padding: 0;
        border: 0;
        border-radius: 50%;
        background: #94a3b8;
        font: inherit;
        cursor: pointer;
        position: relative;
        z-index: 1;
      }

      .note-cell:hover {
        background: #e2e8f0;
      }

      .note-cell.selected {
        background: #38bdf8;
        box-shadow: 0 0 0 4px rgb(56 189 248 / 0.18);
      }

      #hint {
        padding: 10px 14px;
        border-top: 1px solid #1f2937;
        color: #94a3b8;
        background: #0b0b0b;
        font-size: 12px;
      }

      @media (max-width: 720px) {
        #gridWrap {
          padding: 10px;
          overflow-x: auto;
          place-items: center start;
        }

        #noteGrid {
          min-width: 660px;
        }

        #chartWrap {
          padding: 10px;
          overflow-x: auto;
          place-items: center start;
          grid-template-columns: 460px 460px;
        }

        #waveformChart,
        #spectrogramChart {
          min-width: 460px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <div id="title">2D Pitch</div>
        <div id="status">Select a note.</div>
      </div>
      <div id="gridWrap">
        <div id="noteGrid" aria-label="Pitch class by octave grid"></div>
      </div>
      <div id="chartWrap">
        <div id="waveformChart"></div>
        <div id="spectrogramChart"></div>
      </div>
      <div id="hint">
        Arrow keys move to adjacent notes. Click any node to transition from the selected note.
      </div>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
